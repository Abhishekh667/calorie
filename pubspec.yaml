name: calorie_flow
description: A premium calorie tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  hive_flutter: ^1.1.0
  dio: ^5.4.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.0.0
  uuid: ^4.3.3
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  mobile_scanner: ^6.0.2
  image_picker: ^1.0.7
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/
